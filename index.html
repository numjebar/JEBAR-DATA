<style>
  :root{
    --bg:#f5f5f7;
    --bg-2:#ececef;
    --surface:#ffffff;
    --surface-2:#fbfbfd;
    --card:#ffffff;
    --chip:#f0f0f3;
    --hover:#ededf0;
    --sidebar:rgba(250,250,252,.8);
    --header:rgba(245,245,247,.72);
    --ink:#1d1d1f;
    --ink-2:#6e6e73;
    --ink-3:#9a9aa0;
    --line:#e4e4e8;
    --line-2:#ededf0;
    --accent:#0071e3;
    --accent-ink:#0077ed;
    --accent-soft:#e8f1fd;
    --green:#2faf5a;
    --green-soft:#e6f6ec;
    --red:#e0352b;
    --red-soft:#fdecea;
    --orange:#d97a16;
    --orange-soft:#fcf1e2;
    --purple:#7d5bd6;
    --teal:#1aa6a6;
    --radius-lg:20px;
    --radius:14px;
    --radius-sm:10px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.05);
    --shadow:0 2px 6px rgba(0,0,0,.04), 0 10px 34px rgba(0,0,0,.05);
    --shadow-lg:0 12px 50px rgba(0,0,0,.16);
    --font:-apple-system,BlinkMacSystemFont,"Noto Sans Thai","SF Pro Text","Helvetica Neue",sans-serif;
  }
  [data-theme="dark"]{
    --bg:#0b0b0d;
    --bg-2:#161618;
    --surface:#1c1c1e;
    --surface-2:#242426;
    --card:#1c1c1e;
    --chip:#2c2c2e;
    --hover:#2c2c2e;
    --sidebar:rgba(22,22,24,.82);
    --header:rgba(11,11,13,.72);
    --ink:#f5f5f7;
    --ink-2:#a1a1a6;
    --ink-3:#727275;
    --line:#3a3a3c;
    --line-2:#2c2c2e;
    --green:#30d158;
    --green-soft:rgba(48,209,88,.18);
    --red:#ff453a;
    --red-soft:rgba(255,69,58,.18);
    --orange:#ff9f0a;
    --orange-soft:rgba(255,159,10,.18);
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow:0 2px 6px rgba(0,0,0,.3), 0 10px 34px rgba(0,0,0,.4);
    --shadow-lg:0 12px 50px rgba(0,0,0,.6);
  }
  .force-light{
    --bg:#f5f5f7;--surface:#fff;--surface-2:#fbfbfd;--card:#fff;--chip:#f0f0f3;--hover:#ededf0;
    --ink:#1d1d1f;--ink-2:#6e6e73;--ink-3:#9a9aa0;--line:#e4e4e8;--line-2:#ededf0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    font-size:15px;
    line-height:1.45;
    transition:background .3s ease, color .3s ease;
  }
  #root{height:100vh;}
  ::-webkit-scrollbar{width:11px;height:11px;}
  ::-webkit-scrollbar-thumb{background:#c7c7cc;border-radius:8px;border:3px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-thumb:hover{background:#aeaeb2;background-clip:content-box;border:3px solid transparent;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
  h1,h2,h3,h4,p{margin:0;}
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  /* number flow */
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes pop{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
  @keyframes slideInLeft{from{transform:translateX(-100%);}to{transform:translateX(0);}}
  /* entrance reveals must NOT leave content hidden if the animation clock is paused,
     so they animate transform only — never opacity on structural content */
  @keyframes slideIn{from{transform:translateY(10px);}to{transform:translateY(0);}}
  .view-enter{}
  /* responsive grids — ยุบคอลัมน์บนจอแคบ (มือถือ) ให้กราฟ/การ์ดไม่โดนบีบ */
  @media(max-width:820px){
    .r-stack{grid-template-columns:1fr !important;}
    .r-2col{grid-template-columns:repeat(2,1fr) !important;}
  }
  @media(max-width:480px){
    .r-2col{grid-template-columns:1fr !important;}
  }
  @media print{
    .no-print{display:none !important;}
    body{background:#fff;}
    .print-area{box-shadow:none !important;}
  }
</style>
